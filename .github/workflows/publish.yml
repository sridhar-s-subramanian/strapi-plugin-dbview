name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm rebuild better-sqlite3 # ensure the native binary is built for the runner's Node ABI
      - run: npm test
      - run: npm run test:ts:back
      - run: npm run test:ts:front
      - run: npm run test:ts:spec

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish
